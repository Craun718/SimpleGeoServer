[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files" },
  { id = "check-toml" },
  { id = "check-yaml" },
]

[[repos]]
repo = "local"
hooks = [
  # --- commit ---
  { id = "cargo-fmt", name = "Cargo fmt", language = "system",
    entry = "cargo fmt", pass_filenames = false,
    types_or = ["rust"] },
  { id = "cargo-check", name = "Cargo check", language = "system",
    entry = "cargo check --all-targets", pass_filenames = false,
    types_or = ["rust"] },

  # --- push ---
  { id = "cargo-clippy", name = "Cargo clippy", language = "system",
    entry = "cargo clippy --no-deps -- -D warnings",
    pass_filenames = false, types_or = ["rust"], stages =  ["commit", "push"]},
  { id = "cargo-test", name = "Cargo test", language = "system",
    entry = "cargo test", pass_filenames = false,
    types_or = ["rust"], stages =  ["commit", "push"] },
]
